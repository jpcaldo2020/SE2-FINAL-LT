# This file tells GitHub: "Every time someone pushes code, do these things."

name: CI Pipeline           # The name you'll see in the GitHub Actions tab

# WHEN should this run?
on:
  push:                     # Run when code is pushed...
    branches: [main]        # ...to the main branch
  pull_request:             # Also run on pull requests
    branches: [main]

# WHAT should it do?
jobs:
  check-code:
    name: Lint and Test
    runs-on: ubuntu-latest  # Use a Linux machine provided by GitHub

    steps:
      # Step 1: Download your code onto the runner
      - name: Get the code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: check-code
    if: github.event_name == 'push'  # Only build on push, not on PRs

    # Give this job permission to push images
    permissions:
      contents: read
      packages: write

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      # Log in to GitHub's container registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}          # Your GitHub username
          password: ${{ secrets.GITHUB_TOKEN }}  # Auto-provided by GitHub

      # Build and push the image
      - name: Build and push
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .
          docker push ghcr.io/${{ github.repository }}:latest




    